# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# escape time (critical for neovim)
set -sg escape-time 0

# fix colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*-256color:Tc"

# start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# mouse
set -g mouse on

# splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vi keys in copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# reload config
bind r source-file ~/.tmux.conf \; display "reloaded"

# SC recording toggle (live session sclang pane)
bind R run-shell "tmux send-keys -t live:1.1 'if(s.recorder.isRecording, { s.stopRecording }, { s.record });' Enter"

# pane borders
set -g pane-border-style 'fg=#524e48'
set -g pane-active-border-style 'fg=#44BB44'

# status bar
set -g status-style 'bg=#111110 fg=#524e48'
set -g status-left '#[fg=#44BB44][#S] '
set -g status-right '#[fg=#524e48]%H:%M'
set -g status-interval 60

# tmux-resurrect
run ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
