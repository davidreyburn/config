## cava config — raw audio feed for topo-viz
## Outputs 32-bar ASCII amplitude data to /tmp/topo-audio (FIFO)

[general]
framerate = 60
autosens = 1
bars = 32

[input]
method = coreaudio
source = tap

[output]
method = raw
data_format = ascii
raw_target = /tmp/topo-audio
ascii_max_range = 1000

[smoothing]
noise_reduction = 44
